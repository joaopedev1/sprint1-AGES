<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora AGES</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <main>
        <p id="tela"></p>
        <div id="linha-top">
            <button class="especial" onclick="apagarUm()">CE</button>
            <button class="especial" onclick="limpar()">C</button>
            <button class="especial" onclick="inserir('%')">%</button>
            <button class="especial" onclick="inserir('/')">/</button>
        </div>

        <div>
            <button onclick="inserir('7')">7</button>
            <button onclick="inserir('8')">8</button>
            <button onclick="inserir('9')">9</button>
            <button class="especial" onclick="inserir('*')">X</button>
        </div>

        <div>
            <button onclick="inserir('4')">4</button>
            <button onclick="inserir('5')">5</button>
            <button onclick="inserir('6')">6</button>
            <button class="especial" onclick="inserir('-')">-</button>
        </div>

        <div>
            <button onclick="inserir('1')">1</button>
            <button onclick="inserir('2')">2</button>
            <button onclick="inserir('3')">3</button>
            <button class="especial" onclick="inserir('+')">+</button>
        </div>

        <div>
            <button class="especial" onclick="trocarSinal()">+/-</button>
            <button onclick="inserir('0')">0</button>
            <button onclick="inserir(',')">,</button>
            <button class="especial" onclick="calcular()">=</button>
        </div>
    </main>
    <script src="calculadora.js"></script>
</body>
</html>
